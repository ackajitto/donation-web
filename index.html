<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>โครงการบรรพชาสามเณร ภาคฤดูร้อน ประจำปี 2569</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #FDFBF7; }
    .animate-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    .slot-hover:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icon = ({ d, size = 16, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {Array.isArray(d) ? d.map((path, i) => <path key={i} d={path}/>) : <path d={d}/>}
      </svg>
    );

    const ICONS = {
      calendar: "M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z",
      clock: "M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zM12 6v6l4 2",
      user: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z",
      check: "M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4 12 14.01l-3-3",
      alert: "M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01",
      x: "M18 6 6 18M6 6l12 12",
      chat: "M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z",
      clock4: "M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zM12 6v6l3 3",
      link: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3",
      image: "M21 15l-5-5L5 20M3 3h18a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm6.5 6.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z",
      plus: "M12 5v14M5 12h14",
      settings: "M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"
    };

    const MEAL_TYPES = [
      { id: 'breakfast', name: 'มื้อเช้า', time: '07:00 น.', price: 1000 },
      { id: 'lunch', name: 'มื้อเพล', time: '11:00 น.', price: 1000 },
      { id: 'pana', name: 'น้ำปานะ', time: '16:00 น.', price: 500 },
    ];

    function App() {
      // เพิ่ม 'คุณสมชาย' เป็นผู้จองแบบ pending เข้าไปให้มีของให้กดอนุมัติ
      const [bookings, setBookings] = useState({
        '2026-04-01-breakfast': { mainHost: { status: 'booked', name: 'คุณใจบุญ กุศลทาน' } },
        '2026-04-02-lunch': { mainHost: { status: 'pending', name: 'คุณสมชาย ใจดี' } }
      });
      const [dates, setDates] = useState([]);
      const [isAdminMode, setIsAdminMode] = useState(false); // ควบคุมโหมด Admin

      useEffect(() => {
        const gen = [];
        for (let i = 1; i <= 20; i++) {
          const dateId = `2026-04-${i.toString().padStart(2, '0')}`;
          gen.push({ id: dateId, label: `${i} เม.ย. 69`, dayNumber: i });
        }
        setDates(gen);
      }, []);

      // แอดมินกดอนุมัติ
      const handleApprove = (slotKey) => {
        setBookings(prev => ({
          ...prev,
          [slotKey]: { ...prev[slotKey], mainHost: { ...prev[slotKey].mainHost, status: 'booked' } }
        }));
      };

      // แอดมินกดยกเลิก
      const handleReject = (slotKey) => {
        if(window.confirm('แน่ใจหรือไม่ที่จะลบรายการจองนี้?')) {
          setBookings(prev => {
            const newBookings = { ...prev };
            delete newBookings[slotKey].mainHost;
            return newBookings;
          });
        }
      };

      // ดึงเฉพาะรายการที่รอการยืนยัน
      const getPendingBookings = () => {
        let pending = [];
        Object.keys(bookings).forEach(key => {
          if (bookings[key].mainHost?.status === 'pending') {
            const [year, month, day, mealId] = key.split('-');
            const mealName = MEAL_TYPES.find(m => m.id === mealId)?.name || mealId;
            pending.push({ key, dateLabel: `${parseInt(day)} เม.ย. 69`, mealName, ...bookings[key].mainHost });
          }
        });
        return pending;
      };

      const SlotCard = ({ date, meal }) => {
        const slotKey = `${date.id}-${meal.id}`;
        const slotData = bookings[slotKey] || { mainHost: null, inPerson: [] };
        const isBooked = slotData.mainHost?.status === 'booked';
        const isPending = slotData.mainHost?.status === 'pending';

        return (
          <div className={`relative flex flex-col p-4 rounded-xl border transition-all duration-300 h-full slot-hover ${isBooked ? 'bg-gradient-to-b from-green-50 to-emerald-50 border-green-200' : isPending ? 'bg-gradient-to-b from-yellow-50 to-amber-50 border-amber-300' : 'bg-white border-gray-200'}`}>
            <div className="flex justify-between items-start mb-3">
              <div>
                <h4 className="font-semibold text-gray-800 text-sm">{meal.name}</h4>
                <p className="text-xs text-gray-500 flex items-center gap-1 mt-0.5"><Icon d={ICONS.clock} size={12} /> {meal.time}</p>
              </div>
              {isBooked && <div className="bg-green-100 text-green-700 p-1.5 rounded-full"><Icon d={ICONS.check} size={16} /></div>}
              {isPending && <div className="bg-amber-100 text-amber-600 p-1.5 rounded-full"><Icon d={ICONS.clock4} size={16} /></div>}
            </div>
            <div className="mt-auto flex flex-col gap-3">
              <div>
                {isBooked ? (
                  <div className="pt-2 border-t border-green-200/50">
                    <p className="text-[10px] uppercase font-bold text-green-600 mb-0.5">เจ้าภาพหลัก</p>
                    <p className="text-sm font-medium text-gray-800 leading-snug">{slotData.mainHost.name}</p>
                  </div>
                ) : isPending ? (
                  <div className="pt-2 border-t border-amber-300/50">
                    <p className="text-[10px] text-amber-700/80 mb-0.5 font-bold bg-amber-100 inline-block px-1.5 py-0.5 rounded">รอแอดมินยืนยัน</p>
                    <p className="text-sm font-medium text-gray-600 leading-snug opacity-70 italic mt-1">{slotData.mainHost.name}</p>
                  </div>
                ) : (
                  <button className="w-full py-2 px-2 bg-orange-50 border border-orange-500 text-orange-600 rounded-lg text-sm font-medium hover:bg-orange-500 hover:text-white transition-all">ร่วมบุญเป็นเจ้าภาพ</button>
                )}
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-[#FDFBF7] flex flex-col relative">

          {/* ===================== โหมดปกติ (USER VIEW) ===================== */}
          {!isAdminMode ? (
            <>
              {/* Header */}
              <div className="relative pt-20 pb-12 px-6 text-center shadow-lg overflow-hidden flex flex-col justify-end min-h-[320px]">
                <div className="absolute inset-0 z-0" style={{ backgroundImage: "url('https://images.unsplash.com/photo-1540304353841-39659b918af1?auto=format&fit=crop&w=1920&q=80')", backgroundPosition: 'center 30%', backgroundSize: 'cover' }}></div>
                <div className="absolute inset-0 z-10 bg-gradient-to-b from-black/20 via-orange-900/60 to-orange-600"></div>
                <div className="relative z-20 max-w-2xl mx-auto mt-auto pt-8">
                  <h2 className="text-amber-200 font-medium tracking-wider mb-2 text-sm sm:text-base drop-shadow-md">ขอเชิญร่วมเป็นเจ้าภาพภัตตาหาร</h2>
                  <h1 className="text-2xl sm:text-4xl font-bold leading-tight mb-4 drop-shadow-lg text-white">โครงการบรรพชาสามเณร<br/>ภาคฤดูร้อน ประจำปี 2569</h1>
                </div>
              </div>

              {/* Main Table */}
              <main className="flex-grow max-w-5xl mx-auto px-4 py-8 relative z-20 -mt-8 w-full">
                <div className="hidden md:grid md:grid-cols-4 gap-4 mb-4 px-4">
                  <div className="font-semibold text-gray-500 text-center">วันที่ / กิจกรรม</div>
                  <div className="font-semibold text-orange-800 text-center bg-orange-100/50 py-2 rounded-lg">มื้อเช้า</div>
                  <div className="font-semibold text-orange-800 text-center bg-orange-100/50 py-2 rounded-lg">มื้อเพล</div>
                  <div className="font-semibold text-orange-800 text-center bg-orange-100/50 py-2 rounded-lg">น้ำปานะ</div>
                </div>

                <div className="space-y-6 md:space-y-3">
                  {dates.map((date) => (
                    <div key={date.id} className="bg-white md:bg-transparent rounded-2xl shadow-sm border md:border-none border-gray-100 overflow-hidden p-4 md:p-0">
                      <div className="grid grid-cols-1 md:grid-cols-4 gap-3 md:gap-4 items-stretch">
                        <div className={`relative flex flex-col items-center justify-center bg-white border border-gray-200 rounded-xl p-4 shadow-sm`}>
                          <span className="text-4xl md:text-5xl font-bold text-orange-500">{date.dayNumber}</span>
                          <span className="text-sm text-gray-500 font-medium md:mt-2 hidden md:block">เมษายน 2569</span>
                        </div>
                        {MEAL_TYPES.map((meal) => (
                          <SlotCard key={`${date.id}-${meal.id}`} date={date} meal={meal} />
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </main>
            </>
          ) : (
            /* ===================== โหมดหลังบ้าน (ADMIN VIEW) ===================== */
            <div className="max-w-5xl mx-auto p-6 mt-10 w-full">
              <div className="flex justify-between items-center mb-6 border-b pb-4">
                <h1 className="text-3xl font-bold text-gray-800">⚙️ ระบบจัดการหลังบ้าน (Admin)</h1>
                <button onClick={() => setIsAdminMode(false)} className="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 font-bold">
                  กลับไปหน้าร้าน
                </button>
              </div>

              <div className="bg-white rounded-xl shadow-md p-6">
                <h2 className="text-xl font-bold mb-4 text-orange-600 flex items-center gap-2">
                  <span className="relative flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span></span>
                  รายการที่ผู้จองรอการตรวจสอบสลิป
                </h2>
                
                {getPendingBookings().length === 0 ? (
                  <div className="text-gray-500 text-center py-8">
                    <p className="text-lg">ไม่มีรายการรอตรวจสอบในขณะนี้ 🎉</p>
                    <p className="text-sm mt-1">คิวงานเรียบร้อยดีทั้งหมดค่ะ</p>
                  </div>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-gray-100 text-gray-700">
                          <th className="p-3 border-b">วันที่</th>
                          <th className="p-3 border-b">มื้อ</th>
                          <th className="p-3 border-b">ชื่อผู้จอง</th>
                          <th className="p-3 border-b">สถานะ</th>
                          <th className="p-3 border-b">การจัดการ</th>
                        </tr>
                      </thead>
                      <tbody>
                        {getPendingBookings().map((item) => (
                          <tr key={item.key} className="hover:bg-gray-50">
                            <td className="p-3 border-b font-medium text-orange-600">{item.dateLabel}</td>
                            <td className="p-3 border-b">{item.mealName}</td>
                            <td className="p-3 border-b font-bold">{item.name}</td>
                            <td className="p-3 border-b">
                              <span className="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold">รอตรวจสอบ</span>
                            </td>
                            <td className="p-3 border-b flex gap-2">
                              <button onClick={() => handleApprove(item.key)} className="bg-green-500 hover:bg-green-600 text-white px-3 py-1.5 rounded shadow-sm text-sm font-bold flex items-center gap-1">
                                <Icon d={ICONS.check} size={14} /> อนุมัติ
                              </button>
                              <button onClick={() => handleReject(item.key)} className="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded shadow-sm text-sm font-bold flex items-center gap-1">
                                <Icon d={ICONS.x} size={14} /> ยกเลิก
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>
          )}

          {/*ปุ่มสลับโหมดแอดมิน (มุมขวาล่าง) */}
          <button 
            onClick={() => setIsAdminMode(!isAdminMode)}
            className="fixed bottom-5 right-5 bg-slate-900 text-white p-4 rounded-full shadow-2xl hover:bg-slate-800 hover:scale-105 transition-all z-50 flex items-center gap-2 font-bold"
          >
            <Icon d={ICONS.settings} size={20} />
            {isAdminMode ? 'ดูหน้าร้าน' : '⚙️ ระบบแอดมิน'}
          </button>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
